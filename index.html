<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>KorshTech · Оформление заказа</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta property="og:title" content="KorshTech" />
  <meta property="og:image" content="icon-512.png" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #17212b);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #8b9aa8);
      --field: var(--tg-theme-secondary-bg-color, #232e3c);
      --accent: var(--tg-theme-button-color, #3390ec);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --danger: #e25c5c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px 16px 32px;
    }
    .product {
      background: var(--field);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .product .name { font-weight: 600; font-size: 15px; }
    .product .price { color: var(--accent); font-weight: 700; font-size: 18px; margin-top: 4px; }
    label { display: block; font-size: 13px; color: var(--hint); margin: 14px 0 6px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: var(--field);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input.invalid, select.invalid { border-color: var(--danger); }
    .err { color: var(--danger); font-size: 12px; min-height: 14px; margin-top: 4px; }
    #map { height: 240px; border-radius: 12px; margin-top: 6px; overflow: hidden; background: var(--field); }
    .addr-wrap { position: relative; }
    .suggestions {
      position: absolute; left: 0; right: 0; top: calc(100% + 4px);
      background: var(--field); border-radius: 10px; overflow: hidden; z-index: 1000;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
    }
    .suggestions div { padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.06); }
    .suggestions div:last-child { border-bottom: none; }
    .suggestions div:active { background: var(--accent); color: var(--accent-text); }
    .hint-small { color: var(--hint); font-size: 12px; margin-top: 6px; }
    .segmented { display: flex; gap: 8px; margin-top: 6px; }
    .segmented .seg {
      flex: 1; padding: 12px; border-radius: 10px; border: 1px solid transparent;
      background: var(--field); color: var(--text); font-size: 15px; font-weight: 600;
    }
    .segmented .seg.active { border-color: var(--accent); color: var(--accent); }
    #geoBtn {
      width: 100%; margin-top: 8px; padding: 11px; border: 1px solid var(--accent);
      border-radius: 10px; background: transparent; color: var(--accent);
      font-size: 14px; font-weight: 600;
    }
    #geoBtn:disabled { opacity: .5; }
    textarea {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid transparent;
      background: var(--field); color: var(--text); font-size: 16px; outline: none;
      resize: vertical; min-height: 64px; font-family: inherit;
    }
    textarea:focus { border-color: var(--accent); }
    #fallbackSubmit {
      width: 100%; margin-top: 22px; padding: 14px; border: none; border-radius: 12px;
      background: var(--accent); color: var(--accent-text); font-size: 16px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="product" id="product">
    <div class="name" id="pName">Товар</div>
    <div class="price" id="pPrice"></div>
  </div>

  <label for="fio">ФИО</label>
  <input id="fio" type="text" placeholder="Иванов Иван Иванович" autocomplete="name" />
  <div class="err" id="fioErr"></div>

  <label for="phone">Телефон</label>
  <input id="phone" type="tel" placeholder="+7 900 000 00 00" autocomplete="tel" />
  <div class="err" id="phoneErr"></div>

  <label>Способ получения</label>
  <div class="segmented" id="fulfillment">
    <button type="button" class="seg active" data-value="DELIVERY">🚚 Доставка</button>
    <button type="button" class="seg" data-value="PICKUP">🏬 Самовывоз</button>
  </div>

  <div id="deliveryBlock">
    <label for="citySelect">Город доставки</label>
    <select id="citySelect"></select>
    <div class="hint-small" id="cityHint"></div>
    <div id="otherCityWrap" style="display:none">
      <label for="otherCity">Ваш город</label>
      <input id="otherCity" type="text" placeholder="Например: Краснодар" autocomplete="off" />
    </div>
    <div class="err" id="cityErr"></div>

    <label>Адрес доставки</label>
    <div class="addr-wrap">
      <input id="address" type="text" placeholder="Начните вводить: город, улица, дом" autocomplete="off" />
      <div class="suggestions" id="suggestions" style="display:none"></div>
    </div>
    <div id="map"></div>
    <button id="geoBtn" type="button">📍 Моё местоположение</button>
      <div class="hint-small" id="addrHint">Выберите адрес из подсказок, передвиньте точку на карте или нажмите «Моё местоположение».</div>
    <div class="err" id="addrErr"></div>
  </div>

  <div class="hint-small" id="pickupHint" style="display:none">Заберёте заказ самостоятельно — менеджер согласует с вами место и время.</div>

  <label for="comment">Комментарий к заказу (необязательно)</label>
  <textarea id="comment" placeholder="Например: домофон не работает, позвонить за 30 минут"></textarea>

  <button id="fallbackSubmit">Оформить заказ</button>

  <script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }

    const params = new URLSearchParams(location.search);
    const PID = params.get('pid') || '';
    const PNAME = params.get('name') || 'Товар';
    const PRICE = params.get('price') || '';

    // ───────── Ключи (безопасны для браузера; ограничьте по домену/referer в кабинетах) ─────────
    // Приоритет — query-параметры от бота (app.bot.webapp-*), затем хардкод-фоллбэк ниже.
    // Yandex JS API ключ: https://developer.tech.yandex.ru → "JavaScript API и HTTP Геокодер"
    // DaData "Ключ для API": https://dadata.ru/profile/#/ → API ключи
    const YANDEX_API_KEY = params.get('ymaps') || 'PUT_YOUR_YANDEX_JS_API_KEY';
    const DADATA_TOKEN = params.get('dadata') || 'PUT_YOUR_DADATA_TOKEN';
    // Ключ считается заданным, если он непустой и не равен плейсхолдеру.
    const keyOk = (v) => !!v && !/^PUT_YOUR_/.test(v);
    const HAS_YMAPS = keyOk(YANDEX_API_KEY);
    const HAS_DADATA = keyOk(DADATA_TOKEN);

    document.getElementById('pName').textContent = PNAME;
    document.getElementById('pPrice').textContent = PRICE ? (Number(PRICE).toLocaleString('ru-RU') + ' ₽') : '';

    // ───────── Города доставки ─────────
    // Список быстрых городов передаётся ботом как cities=CODE:Label,CODE:Label.
    // Фоллбэк — захардкоженный список (синхронизирован с DeliveryCity на бэке).
    const OTHER_CITY = '__OTHER__';
    const DEFAULT_CITIES = [
      ['MOSCOW', 'Москва'], ['SPB', 'Санкт-Петербург'], ['SAMARA', 'Самара'],
      ['VORONEZH', 'Воронеж'], ['BELGOROD', 'Белгород'],
    ];
    function parseCities(raw) {
      if (!raw) return DEFAULT_CITIES;
      const parsed = raw.split(',').map(p => p.split(':')).filter(p => p.length === 2 && p[0] && p[1]);
      return parsed.length ? parsed : DEFAULT_CITIES;
    }
    const FAST_CITIES = parseCities(params.get('cities'));
    const citySelect = document.getElementById('citySelect');
    const otherCityWrap = document.getElementById('otherCityWrap');
    const otherCityInput = document.getElementById('otherCity');
    const cityErr = document.getElementById('cityErr');
    const cityHint = document.getElementById('cityHint');
    (function fillCities() {
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Выберите город';
      placeholder.disabled = true; placeholder.selected = true;
      citySelect.appendChild(placeholder);
      FAST_CITIES.forEach(([code, label]) => {
        const o = document.createElement('option');
        o.value = code; o.textContent = label;
        citySelect.appendChild(o);
      });
      const other = document.createElement('option');
      other.value = OTHER_CITY;
      other.textContent = 'Другой город (доставка ТК)';
      citySelect.appendChild(other);
    })();
    function selectedCity() {
      const v = citySelect.value;
      if (!v) return { code: null, name: '' };
      if (v === OTHER_CITY) return { code: null, name: otherCityInput.value.trim() };
      const match = FAST_CITIES.find(c => c[0] === v);
      return { code: v, name: match ? match[1] : '' };
    }
    citySelect.addEventListener('change', () => {
      const isOther = citySelect.value === OTHER_CITY;
      otherCityWrap.style.display = isOther ? 'block' : 'none';
      cityHint.textContent = isOther
        ? 'Доставка в этот город осуществляется транспортной компанией.'
        : 'Быстрая доставка в выбранный город.';
      if (citySelect.value && citySelect.value !== OTHER_CITY) cityHint.textContent = 'Быстрая доставка в выбранный город.';
      validate();
    });

    // Prefill ФИО from Telegram profile if available.
    try {
      const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (u) {
        const full = [u.last_name, u.first_name].filter(Boolean).join(' ');
        if (full) document.getElementById('fio').value = full;
      }
    } catch (e) {}

    const addressInput = document.getElementById('address');
    const suggestionsBox = document.getElementById('suggestions');

    // ───────── Yandex Maps (карта для уточнения точки) ─────────
    const DEFAULT = [55.751244, 37.618423]; // Moscow [lat, lon]
    let lat = null, lon = null;
    let map = null, placemark = null;

    function disableMap(message) {
      const el = document.getElementById('map');
      if (el) {
        el.style.height = 'auto';
        el.style.padding = '16px';
        el.style.textAlign = 'center';
        el.style.color = 'var(--hint)';
        el.style.fontSize = '13px';
        el.textContent = message;
      }
    }

    (function loadYmaps() {
      if (!HAS_YMAPS) {
        disableMap('Карта недоступна — введите адрес вручную в поле выше.');
        return;
      }
      const s = document.createElement('script');
      s.src = `https://api-maps.yandex.ru/2.1/?apikey=${YANDEX_API_KEY}&lang=ru_RU`;
      s.onload = () => { if (window.ymaps) ymaps.ready(initMap); };
      s.onerror = () => disableMap('Не удалось загрузить карту — введите адрес вручную в поле выше.');
      document.head.appendChild(s);
    })();

    function initMap() {
      map = new ymaps.Map('map', { center: DEFAULT, zoom: 11, controls: ['zoomControl'] }, { suppressMapOpenBlock: true });
      placemark = new ymaps.Placemark(DEFAULT, {}, { draggable: true, preset: 'islands#redDotIcon' });
      map.geoObjects.add(placemark);
      placemark.events.add('dragend', () => {
        const c = placemark.geometry.getCoordinates();
        setPoint(c[0], c[1], true);
      });
      map.events.add('click', (e) => {
        const c = e.get('coords');
        setPoint(c[0], c[1], true);
      });
    }

    function setPoint(la, lo, doReverse) {
      lat = la; lon = lo;
      if (placemark && map) {
        placemark.geometry.setCoordinates([la, lo]);
        map.setCenter([la, lo], Math.max(map.getZoom(), 16));
      }
      if (doReverse) {
        dadataGeolocate(la, lo).then(s => { if (s) { addressInput.value = s.value; validate(); } });
      }
    }

    // ───────── DaData (подсказки + обратное геокодирование) ─────────
    function dadataHeaders() {
      return {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': 'Token ' + DADATA_TOKEN,
      };
    }
    function dadataSuggest(q) {
      if (!HAS_DADATA) return Promise.resolve([]);
      return fetch('https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address', {
        method: 'POST', headers: dadataHeaders(), body: JSON.stringify({ query: q, count: 6 }),
      }).then(r => r.json()).then(d => (d && d.suggestions) || []).catch(() => []);
    }
    function dadataGeolocate(la, lo) {
      if (!HAS_DADATA) return Promise.resolve(null);
      return fetch('https://suggestions.dadata.ru/suggestions/api/4_1/rs/geolocate/address', {
        method: 'POST', headers: dadataHeaders(), body: JSON.stringify({ lat: la, lon: lo, count: 1 }),
      }).then(r => r.json()).then(d => (d && d.suggestions && d.suggestions[0]) || null).catch(() => null);
    }

    let debounceTimer = null;
    function renderSuggestions(items) {
      suggestionsBox.innerHTML = '';
      if (!items || !items.length) { suggestionsBox.style.display = 'none'; return; }
      items.forEach(it => {
        const div = document.createElement('div');
        div.textContent = it.value;
        div.addEventListener('click', () => {
          addressInput.value = it.value;
          suggestionsBox.style.display = 'none';
          const gla = it.data && it.data.geo_lat, glo = it.data && it.data.geo_lon;
          if (gla && glo) setPoint(parseFloat(gla), parseFloat(glo), false);
          validate();
        });
        suggestionsBox.appendChild(div);
      });
      suggestionsBox.style.display = 'block';
    }

    addressInput.addEventListener('input', () => {
      validate();
      const q = addressInput.value.trim();
      clearTimeout(debounceTimer);
      if (q.length < 3) { suggestionsBox.style.display = 'none'; return; }
      debounceTimer = setTimeout(() => dadataSuggest(q).then(renderSuggestions), 300);
    });
    document.addEventListener('click', (e) => {
      if (!suggestionsBox.contains(e.target) && e.target !== addressInput) suggestionsBox.style.display = 'none';
    });

    // ───────── "Моё местоположение" (Telegram LocationManager + фоллбэк) ─────────
    const geoBtn = document.getElementById('geoBtn');
    function resetGeoBtn() { geoBtn.disabled = false; geoBtn.textContent = '📍 Моё местоположение'; }
    function applyCoords(la, lo) { setPoint(la, lo, true); resetGeoBtn(); }

    function useBrowserGeo() {
      if (!navigator.geolocation) {
        resetGeoBtn();
        if (tg) tg.showAlert('Геолокация недоступна на этом устройстве. Выберите точку на карте.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => applyCoords(pos.coords.latitude, pos.coords.longitude),
        () => {
          resetGeoBtn();
          if (tg) tg.showAlert('Не удалось определить местоположение. Разрешите доступ или выберите точку на карте.');
        },
        { enableHighAccuracy: true, timeout: 10000 },
      );
    }
    function useTelegramGeo(lm) {
      const fetchLoc = () => lm.getLocation((loc) => {
        if (loc && typeof loc.latitude === 'number') { applyCoords(loc.latitude, loc.longitude); return; }
        resetGeoBtn();
        if (lm.isAccessRequested && !lm.isAccessGranted && tg.showConfirm) {
          tg.showConfirm('Доступ к геолокации запрещён. Открыть настройки?', (ok) => { if (ok && lm.openSettings) lm.openSettings(); });
        } else if (tg.showAlert) {
          tg.showAlert('Не удалось получить местоположение. Выберите точку на карте.');
        }
      });
      if (lm.isInited) fetchLoc(); else lm.init(fetchLoc);
    }
    geoBtn.addEventListener('click', () => {
      geoBtn.disabled = true; geoBtn.textContent = '📍 Определяем…';
      const lm = tg && tg.LocationManager;
      const hasTgGeo = lm && tg.isVersionAtLeast && tg.isVersionAtLeast('8.0');
      if (hasTgGeo) useTelegramGeo(lm); else useBrowserGeo();
    });

    // ───────── Способ получения (доставка / самовывоз) ─────────
    let fulfillment = 'DELIVERY';
    const deliveryBlock = document.getElementById('deliveryBlock');
    const pickupHint = document.getElementById('pickupHint');
    document.querySelectorAll('#fulfillment .seg').forEach(btn => {
      btn.addEventListener('click', () => {
        fulfillment = btn.dataset.value;
        document.querySelectorAll('#fulfillment .seg').forEach(b => b.classList.toggle('active', b === btn));
        const isDelivery = fulfillment === 'DELIVERY';
        deliveryBlock.style.display = isDelivery ? 'block' : 'none';
        pickupHint.style.display = isDelivery ? 'none' : 'block';
        if (isDelivery && map) setTimeout(() => map.container.fitToViewport(), 50);
        validate();
      });
    });

    // ───────── Валидация ─────────
    const fioEl = document.getElementById('fio');
    const phoneEl = document.getElementById('phone');
    const fioErr = document.getElementById('fioErr');
    const phoneErr = document.getElementById('phoneErr');
    const addrErr = document.getElementById('addrErr');

    function phoneDigits(s) { return (s.match(/\d/g) || []).length; }

    function validate() {
      let ok = true;
      const fio = fioEl.value.trim();
      if (fio.length < 3 || fio.split(/\s+/).length < 2) {
        fioErr.textContent = 'Укажите фамилию и имя';
        fioEl.classList.add('invalid'); ok = false;
      } else { fioErr.textContent = ''; fioEl.classList.remove('invalid'); }

      const d = phoneDigits(phoneEl.value);
      if (d < 10 || d > 15) {
        phoneErr.textContent = 'Введите корректный номер';
        phoneEl.classList.add('invalid'); ok = false;
      } else { phoneErr.textContent = ''; phoneEl.classList.remove('invalid'); }

      if (fulfillment === 'DELIVERY') {
        const city = selectedCity();
        if (!citySelect.value || (citySelect.value === OTHER_CITY && city.name.length < 2)) {
          cityErr.textContent = citySelect.value === OTHER_CITY ? 'Укажите название города' : 'Выберите город доставки';
          citySelect.classList.add('invalid'); ok = false;
        } else { cityErr.textContent = ''; citySelect.classList.remove('invalid'); }

        const addr = addressInput.value.trim();
        if (addr.length < 5) {
          addrErr.textContent = 'Укажите адрес доставки';
          addressInput.classList.add('invalid'); ok = false;
        } else { addrErr.textContent = ''; addressInput.classList.remove('invalid'); }
      } else {
        cityErr.textContent = ''; citySelect.classList.remove('invalid');
        addrErr.textContent = ''; addressInput.classList.remove('invalid');
      }

      updateMainButton(ok);
      return ok;
    }

    fioEl.addEventListener('input', validate);
    phoneEl.addEventListener('input', validate);
    otherCityInput.addEventListener('input', validate);

    function submit() {
      if (!validate()) return;
      const isDelivery = fulfillment === 'DELIVERY';
      const city = selectedCity();
      const payload = {
        pid: Number(PID) || 0,
        fio: fioEl.value.trim(),
        phone: phoneEl.value.trim(),
        fulfillment: fulfillment,
        city: isDelivery ? city.name : '',
        cityCode: isDelivery ? (city.code || '') : '',
        address: isDelivery ? addressInput.value.trim() : '',
        comment: document.getElementById('comment').value.trim(),
        lat: isDelivery ? lat : null,
        lon: isDelivery ? lon : null,
      };
      if (tg && tg.sendData) {
        tg.sendData(JSON.stringify(payload));
      } else {
        alert('Откройте форму из Telegram-бота.');
      }
    }

    // ───────── Telegram MainButton (фоллбэк — кнопка на странице) ─────────
    function updateMainButton(ok) {
      if (!tg || !tg.MainButton) return;
      if (ok) tg.MainButton.enable(); else tg.MainButton.disable();
    }
    if (tg && tg.MainButton) {
      tg.MainButton.setText('Оформить заказ');
      tg.MainButton.show();
      tg.MainButton.onClick(submit);
      document.getElementById('fallbackSubmit').style.display = 'none';
    } else {
      document.getElementById('fallbackSubmit').addEventListener('click', submit);
    }

    // Подстраиваем подсказку под доступность карты/автоподсказок.
    (function tuneAddrHint() {
      const h = document.getElementById('addrHint');
      if (!h) return;
      if (!HAS_DADATA && !HAS_YMAPS) {
        h.textContent = 'Введите полный адрес доставки вручную.';
      } else if (!HAS_DADATA) {
        h.textContent = 'Введите адрес вручную, точку можно уточнить на карте или кнопкой «Моё местоположение».';
      } else if (!HAS_YMAPS) {
        h.textContent = 'Выберите адрес из подсказок при вводе или нажмите «Моё местоположение».';
      }
    })();

    validate();
  </script>
</body>
</html>
